<!DOCTYPE html>
<html lang="pl">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />

  <title>Anna & Mateusz</title>

  <style>
    body {
      margin: 0;
      min-height: 100vh;
      font-family: Arial, sans-serif;
      background: linear-gradient(135deg, #fff8ef, #f3dfbd, #f6dce1);
      color: #2d2524;
      display: flex;
      justify-content: center;
      align-items: center;
      text-align: center;
      padding: 24px;
    }

    .card {
      background: rgba(255, 255, 255, 0.85);
      padding: 42px 28px;
      border-radius: 32px;
      max-width: 640px;
      box-shadow: 0 20px 60px rgba(0,0,0,0.12);
    }

    .small {
      text-transform: uppercase;
      letter-spacing: 5px;
      color: #b76e79;
      font-size: 13px;
      margin-bottom: 18px;
    }

    h1 {
      font-family: Georgia, serif;
      font-size: 56px;
      margin: 0 0 14px;
    }

    p {
      font-size: 20px;
      line-height: 1.5;
      color: #5f5351;
    }

    .button {
      display: inline-block;
      margin-top: 28px;
      padding: 18px 34px;
      background: #b76e79;
      color: white;
      text-decoration: none;
      border-radius: 999px;
      font-size: 20px;
      font-weight: bold;
    }

    .note {
      margin-top: 24px;
      font-size: 15px;
      color: #7a6c69;
    }

    @media (max-width: 500px) {
      h1 {
        font-size: 42px;
      }

      p {
        font-size: 18px;
      }

      .card {
        padding: 34px 22px;
      }
    }
  </style>
</head>

<body>
  <main class="card">
    <div class="small">Wspomnienia z wesela</div>

    <h1>Adrianna & Tobiasz</h1>

    <p>
      Dziękujemy, że świętujecie ten dzień razem z nami ❤️
    </p>

    <p>
      Jeśli zrobicie zdjęcia lub krótkie filmiki, możecie przesłać je tutaj.
    </p>

    <a
      class="button"
      href="https://www.dropbox.com/request/c9abgqjxe92qxmk6m6lj"
      target="_blank"
      rel="noopener noreferrer"
    >
      Prześlij zdjęcia
    </a>

    <div class="note">
      Zdjęcia nie będą automatycznie widoczne publicznie. Para młoda obejrzy je później.
    </div>
  </main>
</body>
</html>
